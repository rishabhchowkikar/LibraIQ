name: cron-score-recompute
on:
  schedule:
    - cron: "17 0 * * 0" # 00:17 UTC every Sunday
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -f --max-time 90 --retry 3 --retry-delay 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ vars.RENDER_APP_URL }}/internal/cron/score-recompute
