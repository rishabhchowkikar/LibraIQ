name: cron-admin-report
on:
  schedule:
    - cron: "26 9 * * *" # 09:26 UTC daily — after due-reminders finishes
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -f --max-time 90 --retry 3 --retry-delay 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ vars.RENDER_APP_URL }}/internal/cron/admin-report
