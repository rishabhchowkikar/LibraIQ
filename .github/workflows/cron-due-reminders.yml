name: cron-due-reminders
on:
  schedule:
    - cron: "13 9 * * *" # 09:13 UTC daily
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -f --max-time 90 --retry 3 --retry-delay 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ vars.RENDER_APP_URL }}/internal/cron/due-reminders
