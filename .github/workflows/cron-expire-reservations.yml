name: cron-expire-reservations
on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours, at :17
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render to wake up
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ vars.RENDER_APP_URL }}/health")
            if [ "$status" = "200" ]; then
              echo "Render is awake (attempt $i, status $status)"
              exit 0
            fi
            echo "Attempt $i: got status '$status', retrying in 10s..."
            sleep 10
          done
          echo "Render did not wake up in time"
          exit 1

      - name: Trigger expire-reservations
        run: |
          curl -f --max-time 90 --retry 3 --retry-delay 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ vars.RENDER_APP_URL }}/internal/cron/expire-reservations
