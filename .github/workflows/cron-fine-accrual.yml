name: cron-fine-accrual
on:
  schedule:
    - cron: "7 0 * * *" # 00:07 UTC daily
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -f --max-time 90 --retry 3 --retry-delay 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ vars.RENDER_APP_URL }}/internal/cron/fine-accrual
